version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vmledger-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vmledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vmledger}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # For database backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vmledger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vmledger-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: vmledger-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vmledger-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vmledger-api-prod
    environment:
      # Application Settings
      APP_NAME: ${APP_NAME:-VMLedger}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # API Settings
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: ${API_WORKERS:-4}
      
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-vmledger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vmledger}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-30}
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Security Settings
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      
      # Authentication Settings
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      ACCOUNT_LOCKOUT_MINUTES: ${ACCOUNT_LOCKOUT_MINUTES:-30}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      
      # Monitoring Settings
      PING_INTERVAL_SECONDS: ${PING_INTERVAL_SECONDS:-60}
      METRICS_INTERVAL_SECONDS: ${METRICS_INTERVAL_SECONDS:-300}
      ALERT_COOLDOWN_MINUTES: ${ALERT_COOLDOWN_MINUTES:-15}
      CONCURRENT_WORKERS: ${CONCURRENT_WORKERS:-10}
      
      # SSH Settings
      SSH_CONNECTION_TIMEOUT: ${SSH_CONNECTION_TIMEOUT:-10}
      SSH_COMMAND_TIMEOUT: ${SSH_COMMAND_TIMEOUT:-30}
      SSH_MAX_RETRIES: ${SSH_MAX_RETRIES:-3}
      SSH_RETRY_DELAY: ${SSH_RETRY_DELAY:-5}
      
      # Data Retention
      PING_RESULTS_RETENTION: ${PING_RESULTS_RETENTION:-100}
      METRICS_RETENTION: ${METRICS_RETENTION:-1000}
      ALERTS_RETENTION_DAYS: ${ALERTS_RETENTION_DAYS:-90}
      
      # Logging
      LOG_FILE_PATH: /app/logs/vmledger.log
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      LOG_FORMAT: json
      
      # Email Settings (Optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@vmledger.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-True}
      
      # CORS Settings
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: "True"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: uvicorn vmledger.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-4}
    networks:
      - vmledger-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vmledger-celery-worker-prod
    environment:
      # Application Settings
      APP_NAME: ${APP_NAME:-VMLedger}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-vmledger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vmledger}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-30}
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Security Settings
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      
      # Monitoring Settings
      PING_INTERVAL_SECONDS: ${PING_INTERVAL_SECONDS:-60}
      METRICS_INTERVAL_SECONDS: ${METRICS_INTERVAL_SECONDS:-300}
      ALERT_COOLDOWN_MINUTES: ${ALERT_COOLDOWN_MINUTES:-15}
      CONCURRENT_WORKERS: ${CONCURRENT_WORKERS:-10}
      
      # SSH Settings
      SSH_CONNECTION_TIMEOUT: ${SSH_CONNECTION_TIMEOUT:-10}
      SSH_COMMAND_TIMEOUT: ${SSH_COMMAND_TIMEOUT:-30}
      SSH_MAX_RETRIES: ${SSH_MAX_RETRIES:-3}
      SSH_RETRY_DELAY: ${SSH_RETRY_DELAY:-5}
      
      # Data Retention
      PING_RESULTS_RETENTION: ${PING_RESULTS_RETENTION:-100}
      METRICS_RETENTION: ${METRICS_RETENTION:-1000}
      ALERTS_RETENTION_DAYS: ${ALERTS_RETENTION_DAYS:-90}
      
      # Logging
      LOG_FILE_PATH: /app/logs/vmledger.log
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      LOG_FORMAT: json
      
      # Email Settings (Optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@vmledger.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-True}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: celery -A vmledger.celery_app worker --loglevel=info --concurrency=${CONCURRENT_WORKERS:-10}
    networks:
      - vmledger-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "celery -A vmledger.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vmledger-celery-beat-prod
    environment:
      # Application Settings
      APP_NAME: ${APP_NAME:-VMLedger}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-vmledger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vmledger}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-30}
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Security Settings
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      
      # Monitoring Settings
      PING_INTERVAL_SECONDS: ${PING_INTERVAL_SECONDS:-60}
      METRICS_INTERVAL_SECONDS: ${METRICS_INTERVAL_SECONDS:-300}
      ALERT_COOLDOWN_MINUTES: ${ALERT_COOLDOWN_MINUTES:-15}
      CONCURRENT_WORKERS: ${CONCURRENT_WORKERS:-10}
      
      # Logging
      LOG_FILE_PATH: /app/logs/vmledger.log
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - celerybeat_schedule:/app/celerybeat-schedule  # Persist beat schedule
    command: celery -A vmledger.celery_app beat --loglevel=info
    networks:
      - vmledger-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  celerybeat_schedule:

networks:
  vmledger-network:
    driver: bridge
