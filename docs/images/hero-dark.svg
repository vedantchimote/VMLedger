<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#111827"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#07C983" opacity="0.1"/>
  <circle cx="700" cy="320" r="80" fill="#0D9373" opacity="0.1"/>
  
  <!-- Main illustration: VM Dashboard -->
  <g transform="translate(150, 80)">
    <!-- Dashboard container -->
    <rect x="0" y="0" width="500" height="240" rx="12" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    
    <!-- Header bar -->
    <rect x="0" y="0" width="500" height="50" rx="12" fill="#07C983" opacity="0.15"/>
    <circle cx="20" cy="25" r="6" fill="#07C983"/>
    <circle cx="40" cy="25" r="6" fill="#0D9373"/>
    <circle cx="60" cy="25" r="6" fill="#07C983" opacity="0.5"/>
    
    <!-- Title -->
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#F9FAFB">
      VMLedger Dashboard
    </text>
    
    <!-- VM Cards -->
    <!-- Card 1 -->
    <g transform="translate(20, 70)">
      <rect width="140" height="140" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
      <rect x="10" y="10" width="30" height="30" rx="4" fill="#07C983" opacity="0.2"/>
      <rect x="12" y="12" width="26" height="26" rx="3" stroke="#07C983" stroke-width="2" fill="none"/>
      <line x1="18" y1="20" x2="30" y2="20" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="25" x2="28" y2="25" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="30" x2="32" y2="30" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#F9FAFB">web-server-01</text>
      <text x="10" y="78" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF">192.168.1.100</text>
      
      <!-- Status indicator -->
      <circle cx="15" cy="100" r="4" fill="#10B981"/>
      <text x="25" y="104" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Online</text>
      
      <!-- Metrics -->
      <text x="10" y="120" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">CPU: 45%</text>
      <text x="70" y="120" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">RAM: 60%</text>
    </g>
    
    <!-- Card 2 -->
    <g transform="translate(180, 70)">
      <rect width="140" height="140" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
      <rect x="10" y="10" width="30" height="30" rx="4" fill="#07C983" opacity="0.2"/>
      <rect x="12" y="12" width="26" height="26" rx="3" stroke="#07C983" stroke-width="2" fill="none"/>
      <line x1="18" y1="20" x2="30" y2="20" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="25" x2="28" y2="25" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="30" x2="32" y2="30" stroke="#07C983" stroke-width="1.5" stroke-linecap="round"/>
      
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#F9FAFB">db-server-01</text>
      <text x="10" y="78" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF">192.168.1.101</text>
      
      <!-- Status indicator -->
      <circle cx="15" cy="100" r="4" fill="#10B981"/>
      <text x="25" y="104" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Online</text>
      
      <!-- Metrics -->
      <text x="10" y="120" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">CPU: 72%</text>
      <text x="70" y="120" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">RAM: 85%</text>
    </g>
    
    <!-- Card 3 -->
    <g transform="translate(340, 70)">
      <rect width="140" height="140" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
      <rect x="10" y="10" width="30" height="30" rx="4" fill="#EF4444" opacity="0.2"/>
      <rect x="12" y="12" width="26" height="26" rx="3" stroke="#EF4444" stroke-width="2" fill="none"/>
      <line x1="18" y1="20" x2="30" y2="20" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="25" x2="28" y2="25" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="30" x2="32" y2="30" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
      
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#F9FAFB">app-server-02</text>
      <text x="10" y="78" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF">192.168.1.102</text>
      
      <!-- Status indicator -->
      <circle cx="15" cy="100" r="4" fill="#EF4444"/>
      <text x="25" y="104" font-family="Arial, sans-serif" font-size="10" fill="#EF4444">Offline</text>
      
      <!-- Metrics -->
      <text x="10" y="120" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">CPU: --</text>
      <text x="70" y="120" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">RAM: --</text>
    </g>
  </g>
  
  <!-- Bottom text -->
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#07C983">
    Monitor and manage your virtual machines with ease
  </text>
</svg>
